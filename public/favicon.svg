<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#F9F8F6"/>

  <!-- Plate -->
  <circle cx="32" cy="32" r="20" fill="#EBE5DE" stroke="#D4AF37" stroke-width="2"/>

  <!-- Inner plate -->
  <circle cx="32" cy="32" r="12" fill="#F9F8F6"/>

  <!-- Fork -->
  <g stroke="#1A1A1A" stroke-width="2" stroke-linecap="round">
    <line x1="26" y1="20" x2="26" y2="44"/>
    <line x1="24" y1="20" x2="24" y2="26"/>
    <line x1="26" y1="20" x2="26" y2="26"/>
    <line x1="28" y1="20" x2="28" y2="26"/>
  </g>

  <!-- Gold accent dot -->
  <circle cx="40" cy="24" r="2.5" fill="#D4AF37"/>
</svg>